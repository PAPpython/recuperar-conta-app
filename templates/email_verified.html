<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AERON - Email Verificado</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:"Segoe UI",sans-serif;

    background:linear-gradient(
        135deg,
        #020617 0%,
        #0f172a 35%,
        #1e3a8a 70%,
        #3b82f6 100%
    );
}

.card{

    width:700px;
    max-width:90%;

    background:rgba(15,23,42,.92);

    border:1px solid rgba(96,165,250,.25);

    border-radius:24px;

    padding:60px;

    text-align:center;

    backdrop-filter:blur(12px);

    box-shadow:
        0 0 60px rgba(59,130,246,.25);
}

.logo{

    width:180px;

    max-width:80%;

    margin-bottom:25px;
}

.icon{

    font-size:72px;

    margin-bottom:15px;
}

h1{

    color:white;

    margin-bottom:20px;

    font-size:36px;
}

p{

    color:#cbd5e1;

    font-size:18px;

    line-height:1.8;
}

.msg{

    margin-top:15px;

    color:#93c5fd;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

    <img
        src="{{ url_for('static', filename='LOGO/AERON.png') }}"
        class="logo"
        alt="AERON">

    <div class="icon">
        ✅
    </div>

    <h1>Email Verificado</h1>

    <p>
        A sua conta foi validada com sucesso.
    </p>

    <p class="msg">
        Já pode voltar para o AERON e iniciar sessão.
    </p>

</div>

</body>

</html>
