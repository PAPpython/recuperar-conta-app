<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Security Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000000, #1e40af);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD CENTRAL */
.card {
    width: 380px;
    background: #000000;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 0 30px rgba(0,0,0,0.7);
    color: white;
}

/* TITULO */
.card h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 14px;
    border: none;
    border-radius: 6px;
    background: #1e293b;
    color: white;
    outline: none;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #1e40af;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #2563eb;
}

/* ERRO */
.error {
    color: #ff4d4d;
    text-align: center;
    margin-top: 10px;
}

/* INFO BUTTON */
.info {
    position: absolute;
    top: 15px;
    left: 15px;
    background: #1e3a8a;
    border: none;
    color: white;
    padding: 10px 12px;
    border-radius: 50%;
    cursor: pointer;
}

/* FOOTER */
.app-footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    text-align: center;
    color: white;
    font-family: Arial, sans-serif;
}

.footer-buttons {
    margin-bottom: 8px;
}

.footer-btn {
    display: inline-block;
    margin: 0 6px;
    padding: 6px 12px;
    background: #1e40af;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    transition: 0.2s;
}

.footer-btn:hover {
    background: #2563eb;
}

.footer-info p {
    margin: 3px 0;
    font-size: 12px;
    opacity: 0.85;
}

.footer-info a {
    color: #60a5fa;
    text-decoration: none;
}

.footer-info a:hover {
    text-decoration: underline;
}

.credits {
    margin-top: 6px;
    font-size: 11px;
    opacity: 0.7;
}
</style>

<script>
function info() {
    alert(
        "Caso se esqueça dos seus dados, use a opção de Recuperação de Conta dentro da aplicação para repor o acesso.\n\n" +
        "Evite manter a sessão ativa em dispositivos públicos ou partilhados.\n\n" +
        "Este sistema permite terminar sessões ativas nesses dispositivos de forma segura."
    );
}
</script>
</head>

<body>

<button class="info" onclick="info()">ⓘ</button>

<div class="card">

    <h2>INICIAR SESSÃO</h2>

    <form method="POST">

        <label>Username ou Email</label>
        <input name="username" type="text" required>

        <label>Password</label>
        <input name="password" type="password" required>

        <button type="submit">Entrar</button>

    </form>

    {% if erro %}
        <div class="error">{{ erro }}</div>
    {% endif %}

</div>

<!-- FOOTER -->
<footer class="app-footer">

    <div class="footer-bar">

        <a href="/recover_username" class="footer-link">Recuperar Username</a>

        <span class="sep">|</span>

        <a href="/recover_password" class="footer-link">Recuperar Password</a>

        <span class="sep">|</span>

        <a href="https://instagram.com/the.beh_" target="_blank" class="footer-link">
            Instagram
        </a>

        <span class="sep">|</span>

        <span class="footer-text">beh.contacto@gmail.com</span>

        <span class="sep">|</span>

        <span class="footer-text">AERON © 2026 — Rúben Cordeiro</span>

    </div>

</footer>

</body>
</html>
