<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form method="POST">
    <input name="username" placeholder="Username"><br><br>
    <input name="password" type="password" placeholder="Password"><br><br>
    <button type="submit">Entrar</button>
</form>

{% if erro %}
<p style="color:red">{{ erro }}</p>
{% endif %}

</body>
</html>
